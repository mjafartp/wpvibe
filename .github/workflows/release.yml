name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Create release ZIP
        run: |
          mkdir -p release/wpvibe
          rsync -av ./ release/wpvibe/ \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tsconfig.json' \
            --exclude='vite.config.ts' \
            --exclude='tailwind.config.ts' \
            --exclude='postcss.config.js' \
            --exclude='tests' \
            --exclude='phpunit.xml' \
            --exclude='vendor/phpunit' \
            --exclude='release'
          cd release && zip -r wp-vibe.zip wpvibe/
      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" release/wp-vibe.zip --clobber
